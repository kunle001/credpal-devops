version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: credpal_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-credpal_db}
      DB_USER: ${DB_USER:-credpal_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_local}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credpal_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: credpal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-credpal_db}
      POSTGRES_USER: ${DB_USER:-credpal_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - credpal_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-credpal_user} -d ${DB_NAME:-credpal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local

networks:
  credpal_net:
    driver: bridge
