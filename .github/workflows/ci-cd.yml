name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─── Zero GitHub Secrets ──────────────────────────────────────────────────────
# Authentication:  GitHub OIDC → short-lived AWS credentials (no static keys)
# Credentials:     DB_USERNAME / DB_PASSWORD fetched from AWS Secrets Manager
# What lives in GitHub (all non-sensitive Variables, not Secrets):
#   AWS_REGION, AWS_STAGING_DEPLOY_ROLE_ARN, AWS_PROD_DEPLOY_ROLE_ARN,
#   STAGING_PIPELINE_SECRET, PROD_PIPELINE_SECRET,
#   STAGING_DOMAIN, PROD_DOMAIN, ALARM_EMAIL
# ─────────────────────────────────────────────────────────────────────────────

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "20"
  TF_VERSION: "1.7.0"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 – Lint & Test
  # ────────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Audit dependencies (fail on high/critical)
        working-directory: app
        run: npm audit --audit-level=high

      - name: Run tests
        working-directory: app
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/coverage/

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 – Dockerfile Lint
  # ────────────────────────────────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 – Terraform Validate
  # No AWS credentials needed – uses -backend=false
  # ────────────────────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt check (staging)
        working-directory: terraform/environments/staging
        run: terraform fmt -check -recursive

      - name: terraform fmt check (production)
        working-directory: terraform/environments/production
        run: terraform fmt -check -recursive

      - name: terraform init + validate (staging)
        working-directory: terraform/environments/staging
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform init + validate (production)
        working-directory: terraform/environments/production
        run: |
          terraform init -backend=false
          terraform validate

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 – Terraform Plan  (PR only)
  # 1. OIDC → short-lived AWS creds for staging role
  # 2. Fetch DB_USERNAME + DB_PASSWORD from AWS Secrets Manager
  # 3. Run terraform plan, post output as PR comment
  # ────────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request'

    permissions:
      id-token: write       # required for OIDC token exchange
      contents: read
      pull-requests: write  # post plan as PR comment

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 1 – Exchange GitHub OIDC token for short-lived AWS credentials
      - name: Configure AWS credentials (OIDC – no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_STAGING_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 2 – Pull credentials from Secrets Manager and mask them immediately
      - name: Fetch pipeline secrets from AWS Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${{ vars.STAGING_PIPELINE_SECRET }}" \
            --query SecretString --output text)

          DB_USERNAME=$(echo "$SECRET" | jq -r '.DB_USERNAME')
          DB_PASSWORD=$(echo "$SECRET" | jq -r '.DB_PASSWORD')

          # ::add-mask:: must come before writing to GITHUB_ENV
          echo "::add-mask::${DB_USERNAME}"
          echo "::add-mask::${DB_PASSWORD}"

          echo "DB_USERNAME=${DB_USERNAME}" >> "$GITHUB_ENV"
          echo "DB_PASSWORD=${DB_PASSWORD}" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: terraform/environments/staging
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/staging
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_app_image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          TF_VAR_db_username: ${{ env.DB_USERNAME }}
          TF_VAR_db_password: ${{ env.DB_PASSWORD }}
          TF_VAR_domain_name: ${{ vars.STAGING_DOMAIN }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_alarm_email: ${{ vars.ALARM_EMAIL }}
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/staging/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            const body = `#### Terraform Plan – staging \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5 – Build, Scan & Push  (push to main only)
  # Uses GITHUB_TOKEN for GHCR – no AWS credentials needed here.
  # Image is pushed only after a clean Trivy scan.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [lint-and-test, dockerfile-lint, terraform-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write        # push to GHCR
      security-events: write # upload Trivy SARIF

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-provided by GitHub – not a user secret

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: production
          load: true
          tags: scan-target:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (table – visible in log)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:local
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy vulnerability scan (SARIF – enforcing)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:local
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        # Requires GitHub Advanced Security (free for public repos).
        # On private repos without GHAS this step is skipped gracefully.
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Push image (only after clean scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Job 6 – Deploy to Staging  (automatic after build)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_STAGING_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch current task definition from ECS
        run: |
          aws ecs describe-task-definition \
            --task-definition credpal-staging-task \
            --query taskDefinition \
            --output json > /tmp/task-definition-staging.json

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-definition-staging.json
          container-name: credpal-app
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Deploy to ECS – rolling update
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: credpal-staging-service
          cluster: credpal-staging-cluster
          wait-for-service-stability: true

      - name: Smoke test /health
        run: |
          sleep 10
          curl --fail --silent --max-time 15 \
            https://${{ vars.STAGING_DOMAIN }}/health \
            | grep -q '"healthy"' && echo "Smoke test passed."

  # ────────────────────────────────────────────────────────────────────────────
  # Job 7 – Terraform Apply Staging
  # ────────────────────────────────────────────────────────────────────────────
  terraform-apply-staging:
    name: Terraform Apply → Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_STAGING_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch pipeline secrets from AWS Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${{ vars.STAGING_PIPELINE_SECRET }}" \
            --query SecretString --output text)

          DB_USERNAME=$(echo "$SECRET" | jq -r '.DB_USERNAME')
          DB_PASSWORD=$(echo "$SECRET" | jq -r '.DB_PASSWORD')

          echo "::add-mask::${DB_USERNAME}"
          echo "::add-mask::${DB_PASSWORD}"

          echo "DB_USERNAME=${DB_USERNAME}" >> "$GITHUB_ENV"
          echo "DB_PASSWORD=${DB_PASSWORD}" >> "$GITHUB_ENV"

      - name: Terraform Init & Apply
        working-directory: terraform/environments/staging
        run: |
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_app_image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          TF_VAR_db_username: ${{ env.DB_USERNAME }}
          TF_VAR_db_password: ${{ env.DB_PASSWORD }}
          TF_VAR_domain_name: ${{ vars.STAGING_DOMAIN }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_alarm_email: ${{ vars.ALARM_EMAIL }}

  # ────────────────────────────────────────────────────────────────────────────
  # Job 8 – Deploy to Production  (MANUAL APPROVAL REQUIRED)
  # Settings → Environments → production → Required reviewers
  # ────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: terraform-apply-staging
    environment: production   # ← approval gate blocks here

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch current task definition from ECS
        run: |
          aws ecs describe-task-definition \
            --task-definition credpal-production-task \
            --query taskDefinition \
            --output json > /tmp/task-definition-production.json

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-definition-production.json
          container-name: credpal-app
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Deploy to ECS – zero-downtime rolling update
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: credpal-production-service
          cluster: credpal-production-cluster
          wait-for-service-stability: true

  # ────────────────────────────────────────────────────────────────────────────
  # Job 9 – Terraform Apply Production
  # ────────────────────────────────────────────────────────────────────────────
  terraform-apply-production:
    name: Terraform Apply → Production
    runs-on: ubuntu-latest
    needs: deploy-production
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch pipeline secrets from AWS Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${{ vars.PROD_PIPELINE_SECRET }}" \
            --query SecretString --output text)

          DB_USERNAME=$(echo "$SECRET" | jq -r '.DB_USERNAME')
          DB_PASSWORD=$(echo "$SECRET" | jq -r '.DB_PASSWORD')

          echo "::add-mask::${DB_USERNAME}"
          echo "::add-mask::${DB_PASSWORD}"

          echo "DB_USERNAME=${DB_USERNAME}" >> "$GITHUB_ENV"
          echo "DB_PASSWORD=${DB_PASSWORD}" >> "$GITHUB_ENV"

      - name: Terraform Init & Apply
        working-directory: terraform/environments/production
        run: |
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_app_image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          TF_VAR_db_username: ${{ env.DB_USERNAME }}
          TF_VAR_db_password: ${{ env.DB_PASSWORD }}
          TF_VAR_domain_name: ${{ vars.PROD_DOMAIN }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_alarm_email: ${{ vars.ALARM_EMAIL }}
